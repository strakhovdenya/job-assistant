version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: job_assistant_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-job_assistant}
      POSTGRES_USER: ${POSTGRES_USER:-job_assistant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-job_assistant}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-job_assistant} -d ${POSTGRES_DB:-job_assistant}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
    container_name: job_assistant_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://job_assistant:job_assistant@postgres:5432/job_assistant}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
    depends_on:
      postgres:
        condition: service_healthy
    command: uv run --package backend uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: ./apps/frontend/Dockerfile
    container_name: job_assistant_frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://backend:8000/api/v1}
    ports:
      - "8501:8501"
    volumes:
      - .:/workspace
    depends_on:
      backend:
        condition: service_healthy
    command: uv run --package frontend streamlit run app.py --server.address=0.0.0.0 --server.port=8501

volumes:
  postgres_data: